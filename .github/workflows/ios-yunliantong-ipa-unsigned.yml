# 产出未签名 IPA，供第三方企业签平台上传后重签安装（无需 GitHub Secrets）
name: Export IPA for Resign Platform

on:
  workflow_dispatch:

jobs:
  export-ipa:
    runs-on: macos-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: Tencentim/TencentCloud-TIMSDK/iOS/Demo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install CocoaPods
        run: |
          gem install cocoapods -v 1.15.2 --no-document
          pod install --repo-update

      - name: Prepare unsigned export
        run: |
          chmod +x scripts/ci-unsigned-export-prep.sh
          ./scripts/ci-unsigned-export-prep.sh

      - name: Build Release for iOS device (no code sign)
        run: |
          set -o pipefail
          mkdir -p build
          rm -rf build/DerivedData build/ipa_out build/YunLianTong-unsigned.ipa
          xcodebuild build \
            -workspace TUIKitDemo.xcworkspace \
            -scheme TUIKitDemo \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$PWD/build/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Automatic \
            ONLY_ACTIVE_ARCH=NO \
            PRODUCT_BUNDLE_IDENTIFIER=com.guanglian.tim \
            INFOPLIST_KEY_CFBundleDisplayName="云链通" \
            2>&1 | tee build/xcodebuild.log
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then
            echo ""
            echo "========== BUILD ERRORS (search for these) =========="
            grep -nE ': error:|fatal error:|BUILD FAILED|Code Sign error|No profiles|Signing for|ld: |clang: error' build/xcodebuild.log | tail -n 50 || true
            echo "========== END ERRORS =========="
            echo ""
            echo "--- last 80 lines ---"
            tail -n 80 build/xcodebuild.log || true
            exit 65
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: Tencentim/TencentCloud-TIMSDK/iOS/Demo/build/xcodebuild.log
          if-no-files-found: ignore

      - name: Package IPA
        run: |
          set -e
          APP=$(find build/DerivedData/Build/Products -name 'TUIKitDemo.app' -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "::error::TUIKitDemo.app not found under Build/Products"
            find build/DerivedData -type d -name '*.app' || true
            exit 1
          fi
          echo "Using app bundle: $APP"
          du -sh "$APP"
          EXEC=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP/Info.plist" 2>/dev/null || echo TUIKitDemo)
          BIN="$APP/$EXEC"
          if [ ! -f "$BIN" ]; then
            echo "::error::Missing executable: $BIN"
            ls -la "$APP" || true
            exit 1
          fi
          BIN_SIZE=$(stat -f%z "$BIN")
          echo "Executable size: $BIN_SIZE bytes"
          if [ "$BIN_SIZE" -lt 1000000 ]; then
            echo "::error::Executable too small ($BIN_SIZE bytes) — build incomplete"
            exit 1
          fi
          rm -rf build/ipa_out
          mkdir -p build/ipa_out/Payload
          ditto "$APP" "build/ipa_out/Payload/$(basename "$APP")"
          (cd build/ipa_out && zip -qr ../YunLianTong-unsigned.ipa Payload)
          IPA_SIZE=$(stat -f%z build/YunLianTong-unsigned.ipa)
          echo "IPA size: $IPA_SIZE bytes"
          ls -lh build/YunLianTong-unsigned.ipa
          if [ "$IPA_SIZE" -lt 5000000 ]; then
            echo "::error::IPA too small ($IPA_SIZE bytes), expected tens of MB"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YunLianTong-IPA-unsigned
          path: Tencentim/TencentCloud-TIMSDK/iOS/Demo/build/YunLianTong-unsigned.ipa
          if-no-files-found: error
