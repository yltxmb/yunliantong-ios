name: Build YunLianTong IPA (Enterprise)

on:
  workflow_dispatch:
  push:
    tags: ['ios-v*', 'v*']

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: Tencentim/TencentCloud-TIMSDK/iOS/Demo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install CocoaPods
        run: |
          gem install cocoapods -v 1.15.2 --no-document
          pod --version

      - name: Pod install
        run: pod install --repo-update

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}
        run: |
          test -n "$P12_BASE64"
          test -n "$P12_PASSWORD"
          test -n "$PROVISION_BASE64"
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p ci ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p ci ci.keychain
          security import cert.p12 -k ci.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci ci.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | base64 --decode > profile.mobileprovision
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i profile.mobileprovision))
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          PROFILE_PLIST=$(security cms -D -i profile.mobileprovision)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' /dev/stdin <<< "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin <<< "$PROFILE_PLIST")
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV

      - name: Archive
        env:
          IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID }}
        run: |
          BUNDLE_ID="${IOS_BUNDLE_ID:-com.guanglian.tim}"
          xcodebuild archive \
            -workspace TUIKitDemo.xcworkspace \
            -scheme TUIKitDemo \
            -configuration Release \
            -archivePath build/YunLianTong.xcarchive \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            INFOPLIST_KEY_CFBundleDisplayName="云链通" \
            | xcpretty || true
          test -d build/YunLianTong.xcarchive

      - name: Export IPA
        env:
          IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID }}
        run: |
          BUNDLE_ID="${IOS_BUNDLE_ID:-com.guanglian.tim}"
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>enterprise</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>compileBitcode</key><false/>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key><string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/YunLianTong.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YunLianTong-IPA
          path: Tencentim/TencentCloud-TIMSDK/iOS/Demo/build/ipa/*.ipa
